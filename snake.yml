name: Generate Snake Animation

on:
  schedule: # execute every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g @platane/snk svgexport

      - name: Generate snake.svg
        run: |
          snk svg-only --github-user ${{ github.repository_owner }} --output dist/snake.svg --palette github-dark

      - name: Convert SVG to GIF
        run: |
          mkdir -p dist
          svgexport dist/snake.svg dist/snake.gif 600:600

      - name: Update README with GIF
        run: |
          sed -i 's|<img src=".*snake.svg".*>|<img src="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/output/dist/snake.gif" alt="Snake animation" />|' README.md

      - name: Push changes to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: Update snake animation GIF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
